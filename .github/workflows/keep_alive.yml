name: Keep Alive

on:
  schedule:
    # Runs every 10 minutes to keep Render Free tier awake
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Check
        run: |
          curl -s https://batteryems-backend.onrender.com/health
